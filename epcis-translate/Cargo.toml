[package]
name = "epcis-translate"
version = "0.1.0"
edition = "2024"
authors = ["Antigravity <antigravity@gemini.google.com>"]
description = "Zero-allocation bidirectional translators for GS1 identifiers (SGTIN, SSCC, SGLN, GIAI, GRAI)."
license = "MIT OR Apache-2.0"

[dependencies]
epcis-models = { path = "../epcis-models" }
serde = { version = "1.0", features = ["derive"] }
